name: CI
on:
  push:
  pull_request:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Checkout leanSpec submodule
        run: git submodule update --init references/leanSpec
      - uses: leanprover/lean-action@v1
        with:
          test: true
